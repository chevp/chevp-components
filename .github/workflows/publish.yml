name: Build & Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - run: npm ci
      - run: npm run build

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - run: npm ci
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - run: npm ci
      - run: npm run build

      - name: Prepare Pages site
        run: |
          mkdir -p _site/docs _site/dist _site/node_modules
          cp docs/*.html _site/docs/
          cp -r dist/* _site/dist/
          cp -r node_modules/@material _site/node_modules/@material
          cp -r node_modules/lit _site/node_modules/lit
          cp -r node_modules/lit-html _site/node_modules/lit-html
          cp -r node_modules/lit-element _site/node_modules/lit-element
          cp -r node_modules/@lit _site/node_modules/@lit
          cp -r node_modules/@lit-labs _site/node_modules/@lit-labs
          cp -r node_modules/tslib _site/node_modules/tslib
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html><head><meta http-equiv="refresh" content="0;url=docs/demo-material.html"></head></html>
          HTMLEOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
